worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Node app running internally on port 3000
    upstream nestjs {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    server {
        listen 10091;

        # Health check — no extra headers needed, low noise in logs
        location /health {
            proxy_pass         http://nestjs;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log         off;
        }

        # All other routes
        location / {
            proxy_pass         http://nestjs;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Match the 10s global timeout in TimeoutInterceptor, with margin
            proxy_read_timeout    12s;
            proxy_connect_timeout  5s;
            proxy_send_timeout    12s;

            # Disable buffering so streaming responses flow immediately
            proxy_buffering off;
        }
    }
}
